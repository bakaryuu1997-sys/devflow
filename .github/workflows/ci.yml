name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app scripts tests api conftest.py

      - name: Format check (ruff)
        run: python -m ruff format --check app scripts tests api conftest.py

      - name: Run tests
        run: python -m pytest -q
